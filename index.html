<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Sistema de Drenagem Urbana</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
background:#eef3fb;
}

#topo{
background:#1565c0;
color:white;
padding:12px;
font-weight:600;
}

#map{
height:55vh;
}

.container{
padding:20px;
background:white;
}

label{
font-weight:600;
color:#0d47a1;
}

input,select{
width:100%;
padding:7px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}

.section{
margin-top:12px;
padding:10px;
border:1px solid #e0e6f0;
border-radius:8px;
background:#f8fbff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:6px;
}

.checkbox-item{
display:flex;
align-items:center;
font-size:13px;
}

button{
background:#1565c0;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#1565c0;
color:white;
padding:6px;
}

td{
border:1px solid #ddd;
padding:5px;
font-size:12px;
}

</style>

</head>

<body>

<div id="topo">Mapa de Drenagem Urbana</div>

<div id="map"></div>

<div class="container">

<label>ID</label>
<input id="idboca" readonly>

<label>Tipo</label>

<select id="tipo">
<option value="BL">BL - Boca de Lobo</option>
<option value="CL">CL - Caixa de Leão</option>
</select>

<label>Quantidade</label>
<input type="number" id="qtd" value="1">

<label>Rua</label>
<input id="rua">

<label>Vila</label>
<input id="vila">

<label>Bairro</label>
<input id="bairro">

<div class="section">

<h3>Lado da Via</h3>

<div class="grid">

<label class="checkbox-item"><input type="checkbox" class="lado" value="Direita">Direita</label>
<label class="checkbox-item"><input type="checkbox" class="lado" value="Esquerda">Esquerda</label>
<label class="checkbox-item"><input type="checkbox" class="lado" value="Canteiro">Canteiro</label>

</div>

</div>

<div class="section">

<h3>Problemas</h3>

<div id="problemas" class="grid"></div>

</div>

<button onclick="capturar()">Capturar Localização</button>
<button onclick="salvar()">Salvar</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<h3>Contador por Bairro</h3>
<div id="contador"></div>

<table id="tabela">

<thead>

<tr>
<th>ID</th>
<th>Rua</th>
<th>Bairro</th>
<th>Tipo</th>
<th>Qtd</th>
<th>Lado</th>
<th>Problemas</th>
<th>Lat</th>
<th>Lon</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let mapa=L.map('map').setView([-23.707,-46.414],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapa)

let iconeBL = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/854/854878.png",
iconSize:[28,28]
})

let iconeCL = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/854/854866.png",
iconSize:[28,28]
})

let latitude=null
let longitude=null

let contadorBL = localStorage.getItem("contadorBL") ? Number(localStorage.getItem("contadorBL")) : 1
let contadorCL = localStorage.getItem("contadorCL") ? Number(localStorage.getItem("contadorCL")) : 1

let registros = localStorage.getItem("bocas") ? JSON.parse(localStorage.getItem("bocas")) : []

const problemasLobo=[
"Limpeza","Trocar tampa","Trocar guia","Refazer caixa",
"Obstrução tubulação","Afundamento caixa","Solapamento tubulação","Caixa fora padrão"
]

const problemasLeao=[
"Limpeza","Reparo grade","Trocar grade","Refazer caixa",
"Obstrução tubulação","Afundamento caixa","Solapamento tubulação","Gradil fora padrão"
]

gerarID()
carregarProblemas()
carregarMapa()

function gerarID(){

let tipo=document.getElementById("tipo").value

if(tipo==="BL")
document.getElementById("idboca").value="BL-"+String(contadorBL).padStart(4,'0')

if(tipo==="CL")
document.getElementById("idboca").value="CL-"+String(contadorCL).padStart(4,'0')

}

document.getElementById("tipo").addEventListener("change",()=>{
gerarID()
carregarProblemas()
})

function carregarProblemas(){

let tipo=document.getElementById("tipo").value
let lista = tipo==="CL" ? problemasLeao : problemasLobo
let div=document.getElementById("problemas")

div.innerHTML=""

lista.forEach(p=>{
div.innerHTML+=`
<label class="checkbox-item">
<input type="checkbox" class="problema" value="${p}">
${p}
</label>`
})

}

function capturar(){

navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude
longitude=pos.coords.longitude

mapa.setView([latitude,longitude],17)

buscarRua(latitude,longitude)

})

}

function buscarRua(lat,lon){

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(r=>r.json())
.then(d=>{

document.getElementById("rua").value=d.address.road||""
document.getElementById("bairro").value=d.address.suburb||""

})

}

function salvar(){

if(latitude===null){
alert("Capture a localização primeiro")
return
}

let id=document.getElementById("idboca").value
let rua=document.getElementById("rua").value
let bairro=document.getElementById("bairro").value
let tipo=document.getElementById("tipo").value
let qtd=document.getElementById("qtd").value

let lado=[]
document.querySelectorAll(".lado:checked").forEach(c=>lado.push(c.value))

let problemas=[]
document.querySelectorAll(".problema:checked").forEach(c=>problemas.push(c.value))

let icone = tipo==="BL" ? iconeBL : iconeCL

L.marker([latitude,longitude],{icon:icone}).addTo(mapa).bindPopup(id)

let registro={
id,rua,bairro,tipo,qtd,
lado:lado.join("/"),
problemas:problemas.join(", "),
lat:latitude,
lon:longitude
}

registros.push(registro)

localStorage.setItem("bocas",JSON.stringify(registros))

if(tipo==="BL"){
contadorBL++
localStorage.setItem("contadorBL",contadorBL)
}

if(tipo==="CL"){
contadorCL++
localStorage.setItem("contadorCL",contadorCL)
}

adicionarTabela(registro)

gerarID()

contador()

}

function adicionarTabela(r){

let tabela=document.querySelector("#tabela tbody")

let linha=tabela.insertRow()

linha.insertCell(0).innerText=r.id
linha.insertCell(1).innerText=r.rua
linha.insertCell(2).innerText=r.bairro
linha.insertCell(3).innerText=r.tipo
linha.insertCell(4).innerText=r.qtd
linha.insertCell(5).innerText=r.lado
linha.insertCell(6).innerText=r.problemas
linha.insertCell(7).innerText=r.lat
linha.insertCell(8).innerText=r.lon

}

function carregarMapa(){

registros.forEach(r=>{

let icone = r.tipo==="BL" ? iconeBL : iconeCL

L.marker([r.lat,r.lon],{icon:icone}).addTo(mapa)

adicionarTabela(r)

})

contador()

}

function contador(){

let cont={}

registros.forEach(d=>{

if(!cont[d.bairro]) cont[d.bairro]=0
cont[d.bairro]+=Number(d.qtd)

})

let html=""

for(let b in cont)
html+=b+" : "+cont[b]+" estruturas <br>"

document.getElementById("contador").innerHTML=html

}

function exportarExcel(){

let ws = XLSX.utils.json_to_sheet(registros)

let wb = XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Drenagem")

XLSX.writeFile(wb,"drenagem_urbana.xlsx")

}

</script>

</body>
</html>
