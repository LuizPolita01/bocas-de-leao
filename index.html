<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Sistema de Drenagem Urbana</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:'Montserrat',sans-serif;
margin:0;
background:#eef3fb;
}

#topo{
background:#1565c0;
color:white;
padding:12px;
font-weight:600;
}

#map{
height:55vh;
}

.container{
padding:20px;
background:white;
}

label{
font-weight:600;
color:#0d47a1;
}

input,select{
width:100%;
padding:7px;
margin-bottom:8px;
border-radius:6px;
border:1px solid #ccc;
}

.section{
margin-top:12px;
padding:10px;
border:1px solid #e0e6f0;
border-radius:8px;
background:#f8fbff;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:6px;
}

.checkbox-item{
display:flex;
align-items:center;
font-size:13px;
}

.checkbox-item input{
margin-right:6px;
}

button{
background:#1565c0;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#1565c0;
color:white;
padding:6px;
}

td{
border:1px solid #ddd;
padding:5px;
font-size:12px;
}

</style>
</head>

<body>

<div id="topo">Mapa de Drenagem Urbana</div>

<div id="map"></div>

<div class="container">

<label>ID da Boca</label>
<input id="idboca" readonly>

<label>Tipo</label>
<select id="tipo">
<option>Boca de Lobo</option>
<option>Boca de Leão</option>
</select>

<label>Quantidade</label>
<input type="number" id="qtd" value="1">

<label>Rua</label>
<input id="rua">

<label>Vila</label>
<input id="vila">

<label>Bairro</label>
<input id="bairro">

<div class="section">

<h3>Lado da Via</h3>

<div class="grid">

<label class="checkbox-item"><input type="checkbox" class="lado" value="Direita">Direita</label>
<label class="checkbox-item"><input type="checkbox" class="lado" value="Esquerda">Esquerda</label>
<label class="checkbox-item"><input type="checkbox" class="lado" value="Canteiro">Canteiro</label>

</div>

</div>

<div class="section">

<h3>Problemas</h3>

<div id="problemas" class="grid"></div>

</div>

<button onclick="capturar()">Capturar Localização</button>
<button onclick="salvar()">Salvar Boca</button>
<button onclick="exportar()">Exportar CSV</button>

<h3>Contador por Bairro</h3>
<div id="contador"></div>

<table id="tabela">

<thead>

<tr>

<th>ID</th>
<th>Rua</th>
<th>Bairro</th>
<th>Tipo</th>
<th>Qtd</th>
<th>Lado</th>
<th>Problemas</th>
<th>Lat</th>
<th>Lon</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let mapa=L.map('map').setView([-23.707,-46.414],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapa)

let latitude
let longitude
let contadorID=1
let dados=[]

const problemasLobo=[
"Limpeza",
"Trocar tampa",
"Trocar guia",
"Refazer caixa",
"Obstrução tubulação",
"Afundamento caixa",
"Solapamento tubulação",
"Caixa/tampa fora de padrão"
]

const problemasLeao=[
"Limpeza",
"Reparo da grade",
"Troca ou reinstalação de grade",
"Refazer caixa",
"Obstrução tubulação",
"Afundamento caixa",
"Solapamento tubulação",
"Gradil ou caixa fora de padrão"
]

gerarID()
carregarProblemas()

function gerarID(){
document.getElementById("idboca").value="BL-"+String(contadorID).padStart(4,'0')
}

function carregarProblemas(){

let tipo=document.getElementById("tipo").value

let lista=tipo==="Boca de Leão"?problemasLeao:problemasLobo

let div=document.getElementById("problemas")

div.innerHTML=""

lista.forEach(p=>{

div.innerHTML+=`
<label class="checkbox-item">
<input type="checkbox" class="problema" value="${p}">
${p}
</label>`

})

}

document.getElementById("tipo").addEventListener("change",carregarProblemas)

function capturar(){

navigator.geolocation.getCurrentPosition(function(pos){

latitude=pos.coords.latitude
longitude=pos.coords.longitude

mapa.setView([latitude,longitude],17)

buscarRua(latitude,longitude)

})

}

function buscarRua(lat,lon){

fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
.then(r=>r.json())
.then(d=>{

document.getElementById("rua").value=d.address.road||""
document.getElementById("bairro").value=d.address.suburb||""

})

}

function corMarcador(problemas){

if(problemas.length===0) return "blue"

if(problemas.includes("Limpeza")) return "orange"

return "red"

}

function salvar(){

let id=document.getElementById("idboca").value
let rua=document.getElementById("rua").value
let bairro=document.getElementById("bairro").value
let tipo=document.getElementById("tipo").value
let qtd=document.getElementById("qtd").value

let lado=[]
document.querySelectorAll(".lado:checked").forEach(c=>lado.push(c.value))

let problemas=[]
document.querySelectorAll(".problema:checked").forEach(c=>problemas.push(c.value))

let cor=corMarcador(problemas)

L.circleMarker([latitude,longitude],{radius:7,color:cor}).addTo(mapa)

dados.push({bairro,qtd})

let tabela=document.querySelector("#tabela tbody")

let linha=tabela.insertRow()

linha.insertCell(0).innerText=id
linha.insertCell(1).innerText=rua
linha.insertCell(2).innerText=bairro
linha.insertCell(3).innerText=tipo
linha.insertCell(4).innerText=qtd
linha.insertCell(5).innerText=lado.join("/")
linha.insertCell(6).innerText=problemas.join(", ")
linha.insertCell(7).innerText=latitude
linha.insertCell(8).innerText=longitude

contadorID++
gerarID()

contador()

}

function contador(){

let cont={}

dados.forEach(d=>{

if(!cont[d.bairro]) cont[d.bairro]=0
cont[d.bairro]+=Number(d.qtd)

})

let html=""

for(let b in cont){
html+=b+" : "+cont[b]+" bocas <br>"
}

document.getElementById("contador").innerHTML=html

}

function exportar(){

let tabela=document.getElementById("tabela")

let csv=[]

for(let i=0;i<tabela.rows.length;i++){

let cols=tabela.rows[i].querySelectorAll("td,th")

let row=[]

cols.forEach(c=>row.push(c.innerText))

csv.push(row.join(","))

}

let blob=new Blob([csv.join("\n")])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="drenagem.csv"
a.click()

}

</script>

</body>
</html>
